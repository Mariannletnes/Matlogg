<!doctype html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matlogg - Oppskriftsanalyse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Matlogg</h1>
      <p>Lim inn én ingrediens per linje for å beregne næringsinnholdet.</p>

      <div class="field">
        <label for="recipeInput">Oppskrift</label>
        <textarea id="recipeInput" rows="8" placeholder="For eksempel:&#10;150 g havregryn&#10;2 egg&#10;3 epler"></textarea>
      </div>

      <div class="button-row">
        <button id="parseBtn" class="primary" type="button">Analyser oppskrift</button>
      </div>
    </section>

    <section class="card">
      <h2>Resultater</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Original linje</th>
              <th>Ingrediens</th>
              <th>Vekt</th>
              <th>Energi (kcal)</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <!-- JavaScript-koden vil fylle inn radene her automatisk -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Dette er linjen som kobler HTML-siden sammen med JavaScript-motoren vår -->
  <script src="app.js"></script>
</body>
</html>
